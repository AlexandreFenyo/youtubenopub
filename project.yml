name: YoutubeNoPub
options:
  bundleIdPrefix: net.fenyo.apple
  deploymentTarget:
    iOS: "16.0"

targets:
  YoutubeNoPub:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: YoutubeNoPub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fenyo.apple.youtubenopub
        INFOPLIST_FILE: YoutubeNoPub/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: YoutubeNoPub/YoutubeNoPub.entitlements
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ShareExtension
        embed: true

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fenyo.apple.youtubenopub.shareextension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        SWIFT_VERSION: "5.9"

schemes:
  YoutubeNoPub:
    build:
      targets:
        YoutubeNoPub: all
        ShareExtension: all
    run:
      config: Debug
      executable: YoutubeNoPub
