name: ShareManager
options:
  bundleIdPrefix: net.fenyo.apple
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  knownRegions:
    - en
    - fr
    - es
    - pt
    - de
    - it
    - ja
    - zh-Hans
    - zh-Hant
    - ko
    - ar
    - ru
    - hi
    - nl
    - pl

targets:
  ShareManager:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ShareManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fenyo.apple.sharemanager
        INFOPLIST_FILE: ShareManager/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: ShareManager/ShareManager.entitlements
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ShareExtension
        embed: true

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fenyo.apple.sharemanager.shareextension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        SWIFT_VERSION: "5.9"

schemes:
  ShareManager:
    build:
      targets:
        ShareManager: all
        ShareExtension: all
    run:
      config: Debug
      executable: ShareManager
